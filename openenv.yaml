spec_version: 1
name: email-triage-env
version: 1.0.0
author: uppada
repository: https://github.com/varshu2024/email-triage-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
license: Apache-2.0
description: >
  A real-world email triage OpenEnv environment. An AI agent processes inbox
  emails by classifying urgency, routing to departments, drafting replies,
  and escalating critical issues. Three tasks of increasing difficulty.
tags:
  - openenv
  - email
  - triage
  - real-world
  - nlp
tasks:
  - name: classify-urgency
    difficulty: easy
  - name: route-emails
    difficulty: medium
  - name: full-triage
    difficulty: hard
